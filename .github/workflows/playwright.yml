name: Playwright Tests
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
permissions:
  contents: read
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 24.x # Backward compatibility
          - 25.x
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Environments
        uses: ./.github/actions/setup
      - name: Install Playwright Browsers
        run: pnpm --filter @juun/web exec playwright install --with-deps chromium
      - name: Build web app
        run: pnpm build --filter @juun/web
      - name: Run Playwright tests
        run: pnpm --filter @juun/web exec playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
