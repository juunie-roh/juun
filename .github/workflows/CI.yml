name: CI
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  prepare:
    strategy:
      matrix:
        node-version:
          - 24.x # Backward compatibility
          - 25.x
    name: Check with ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Environments
        uses: ./.github/actions/setup

      - name: esLinter
        run: pnpm lint
      - name: Type Checking
        run: pnpm check-types

  unit-test:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version:
          - 24.x # Backward compatibility
          - 25.x

    name: Test with ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Environments
        uses: ./.github/actions/setup
       # Storybook tests require playwright browsers
      - name: Install Playwright browsers
        run: pnpm web exec playwright install --with-deps chromium

      - name: Run Tests
        run: pnpm test
