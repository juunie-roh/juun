name: Setup Required Environment
description: something

runs:
  using: composite
  steps:
    - name: Cache turbo build setup
      uses: actions/cache@v5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - uses: pnpm/action-setup@v5

    - name: Setup PNPM cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.pnpm-store
          ${{ github.workspace }}/.pnpm-store
          node_modules
          */*/node_modules
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
    # Build sub packages and generate types declarations
    - name: Build packages
      run: pnpm --filter @juun/db --filter @juun/api build
      shell: bash
    - name: Generate Next.js types
      run: pnpm --filter @juun/web exec next typegen
      shell: bash
